name: LineageOS CI (GT-S7275R)

on:
  workflow_dispatch:
jobs:
  build:
    name: LineageOS Build CI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - name: Check Out
      uses: actions/checkout@v7
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main
    - name: Installing JDK 7 + Build Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository ppa:deadsnakes/ppa
        sudo add-apt-repository universe
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex axel protobuf-compiler libprotobuf-dev g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf lib32readline-dev lib32z1-dev libdw-dev libelf-dev lz4 libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
        wget https://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb && sudo dpkg -i libtinfo5_6.3-2_amd64.deb && rm -f libtinfo5_6.3-2_amd64.deb
        wget https://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.3-2_amd64.deb && sudo dpkg -i libncurses5_6.3-2_amd64.deb && rm -f libncurses5_6.3-2_amd64.deb
        cd /usr/local/src
        sudo wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
        sudo tar xvf Python-2.7.18.tgz
        cd Python-2.7.18
        sudo ./configure --enable-optimizations
        sudo make altinstall
        sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
        sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python
    - name: Install OpenJDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'
    - name: Syncing LineageOS sources
      run: |
        mkdir ~/TWRP
        cd ~/TWRP
        mkdir ~/.bin
        curl http://commondatastorage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
        python3 ~/.bin/repo init --depth=1 -u https://github.com/LineageOS-Revived/android.git -b cm-14.1
        curl --create-dirs -L -o .repo/local_manifests/loganreltexx.xml -O -L https://raw.githubusercontent.com/notnoelchannel2/j3xlte_manifest/refs/heads/main/loganreltexx.xml
        git clone --depth 1 --branch android-7.1.2_r37 --single-branch https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-eabi-4.8 /opt/toolchains/arm-eabi-4.8/
        git lfs install
        python3 ~/.bin/repo sync -c --force-sync --optimized-fetch --no-tags --no-clone-bundle --prune -j$(nproc --all)
    - name: Cleaning up even more
      run: |
        sudo du -sh /var/cache/apt/archives
        sudo apt-get autoclean
        sudo journalctl --rotate
        sudo journalctl --vacuum-size=100M
    - name: Inject sap-api-java-static Bypass Fix
      run: |
        echo "Creating standalone sap-api definition..."
        cd ~/TWRP
        mkdir -p hardware/sap-fix
        cat << 'EOF' > hardware/sap-fix/Android.mk
        LOCAL_PATH := $(call my-dir)
        include $(CLEAR_VARS)
        LOCAL_MODULE := sap-api-java-static
        LOCAL_SRC_FILES := sap-api.proto
        LOCAL_PROTOC_OPTIMIZE_TYPE := micro
        include $(BUILD_STATIC_JAVA_LIBRARY)
        EOF
        
        curl -s https://raw.githubusercontent.com/LineageOS/android_hardware_ril/cm-14.1/librilutils/proto/sap-api.proto > hardware/sap-fix/sap-api.proto
        
        if [ -f "hardware/sap-fix/sap-api.proto" ] && [ -s "hardware/sap-fix/sap-api.proto" ]; then
          echo "Successfully injected sap-api-java-static fix into hardware/sap-fix!"
        else
          echo "Failed to download protobuf file. Checking network connection." && exit 1
        fi
    - name: Fix Missing CAF RIL Headers
      run: |
        echo "1. Creating the missing CAF telephony include directory..."
        mkdir -p hardware/ril-caf/include/telephony

        echo "2. Populating the directory with the missing headers..."
        if [ -d "hardware/ril/include/telephony" ]; then
          # If standard AOSP RIL exists, copy its headers to the CAF path to satisfy the compiler
          cp -r hardware/ril/include/telephony/* hardware/ril-caf/include/telephony/
          echo "Successfully copied standard RIL headers to CAF path!"
        else
          # Fallback: Download exactly what it needs straight from LineageOS cm-14.1 upstream
          echo "Standard RIL missing. Downloading headers from LineageOS upstream..."
          curl -s https://raw.githubusercontent.com/LineageOS/android_hardware_ril/cm-14.1/include/telephony/ril.h > hardware/ril-caf/include/telephony/ril.h
          curl -s https://raw.githubusercontent.com/LineageOS/android_hardware_ril/cm-14.1/include/telephony/ril_cdma_sms.h > hardware/ril-caf/include/telephony/ril_cdma_sms.h
          curl -s https://raw.githubusercontent.com/LineageOS/android_hardware_ril/cm-14.1/include/telephony/ril_nv_items.h > hardware/ril-caf/include/telephony/ril_nv_items.h
          echo "Successfully downloaded fallback headers!"
        fi
    - name: Building LineageOS
      run: |
        OLDPATH=$PATH
        OLDJAVAHOME=$JAVA_HOME
        export PATH="$HOME/.jdk_7/java-se-7u75-ri/bin:$PATH"
        export JAVA_HOME="$HOME/.jdk_7/java-se-7u75-ri"
        git config --global user.email "you@example.com"
        git config --global user.name "Your Name"
        cd ~/TWRP
        rm -rf external/chromium-webview/
        git clone https://github.com/LineageOS/android_external_chromium-webview external/chromium-webview/
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        lunch lineage_loganreltexx-userdebug
        m org.cyanogenmod.platform -j$(nproc --all)
        make -j$(nproc --all) otapackage
        export PATH=$OLDPATH
        export JAVA_HOME=$OLDJAVAHOME
    - name: Uploading LineageOS builds
      uses: actions/upload-artifact@v7
      with:
        name: lineageos
        path: /home/runner/TWRP/out/target/product/loganreltexx/*.zip
